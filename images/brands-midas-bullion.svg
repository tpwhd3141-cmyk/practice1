<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="petal1" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#F5E090"/>
      <stop offset="50%" stop-color="#C8A84B"/>
      <stop offset="100%" stop-color="#7A5C10" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDE0"/>
      <stop offset="60%" stop-color="#F5E090"/>
      <stop offset="100%" stop-color="#C8A84B"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8A84B"/>
      <stop offset="40%" stop-color="#F5E090"/>
      <stop offset="60%" stop-color="#C8A84B"/>
      <stop offset="100%" stop-color="#9A7B2E"/>
    </linearGradient>
  </defs>

  <!-- Flower symbol (54x54 scaled to 80x80, centered at 60,100) -->
  <g transform="translate(20, 62) scale(1.48)">
    <ellipse cx="27" cy="16" rx="9" ry="15" fill="url(#petal1)" opacity="0.85" transform="rotate(0 27 27)"/>
    <ellipse cx="27" cy="16" rx="9" ry="15" fill="url(#petal1)" opacity="0.85" transform="rotate(60 27 27)"/>
    <ellipse cx="27" cy="16" rx="9" ry="15" fill="url(#petal1)" opacity="0.85" transform="rotate(120 27 27)"/>
    <ellipse cx="27" cy="16" rx="9" ry="15" fill="url(#petal1)" opacity="0.85" transform="rotate(180 27 27)"/>
    <ellipse cx="27" cy="16" rx="9" ry="15" fill="url(#petal1)" opacity="0.85" transform="rotate(240 27 27)"/>
    <ellipse cx="27" cy="16" rx="9" ry="15" fill="url(#petal1)" opacity="0.85" transform="rotate(300 27 27)"/>
    <circle cx="27" cy="27" r="8" fill="url(#centerGlow)"/>
    <circle cx="27" cy="27" r="8" fill="none" stroke="#C8A84B" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- MIDAS BULLION text -->
  <text x="115" y="95" font-family="Georgia, serif" font-size="42" font-weight="700" letter-spacing="8" fill="url(#textGrad)">MIDAS BULLION</text>
  <!-- Korean subtext -->
  <text x="118" y="130" font-family="serif" font-size="16" letter-spacing="6" fill="#B8960C">금화는 미다스</text>
</svg>
